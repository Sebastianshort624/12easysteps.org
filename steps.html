<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Steps Workbook | 12 Easy Steps</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&family=Outfit:wght@600&display=swap" rel="stylesheet">
<style>
:root{--blue:#1B3A6B;--gold:#C9A84C;--gold2:#E8C97A;--lb1:#EBF4FD}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--blue);font-family:'Outfit',sans-serif;display:flex;flex-direction:column}
nav{background:var(--blue);padding:.8rem 1.2rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(201,168,76,.22);flex-shrink:0}
.nav-brand{display:flex;align-items:center;gap:.6rem;text-decoration:none}
.diamond{width:24px;height:24px;background:linear-gradient(135deg,var(--gold),var(--gold2));clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%)}
.brand-text{font-family:'Cormorant Garamond',serif;font-size:1.05rem;font-weight:700;color:#fff}
.nav-links{display:flex;gap:.3rem}
.nav-link{color:rgba(255,255,255,.55);text-decoration:none;font-size:.68rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:.35rem .75rem;border-radius:4px;transition:all .2s}
.nav-link:hover,.nav-link.active{color:#fff;background:rgba(255,255,255,.12)}
.frame-wrap{flex:1;position:relative}
iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none}
.loading{position:absolute;top:0;left:0;width:100%;height:100%;background:var(--blue);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;z-index:10;transition:opacity .4s}
.loading.done{opacity:0;pointer-events:none}
.spin-diamond{width:44px;height:44px;background:linear-gradient(135deg,var(--gold),var(--gold2));clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%);animation:pulse 1.4s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.18)}}
.loading p{font-family:'Cormorant Garamond',serif;font-size:1rem;color:rgba(255,255,255,.65);letter-spacing:.06em}
.fallback{display:none;position:absolute;top:0;left:0;width:100%;height:100%;background:var(--lb1);flex-direction:column;align-items:center;justify-content:center;gap:1rem;padding:2rem;text-align:center}
.fallback h2{font-family:'Cormorant Garamond',serif;font-size:1.8rem;color:var(--blue)}
.fallback p{color:#4A6FA5;font-size:.88rem;max-width:360px;line-height:1.6}
.fallback a{padding:.65rem 1.6rem;background:var(--blue);color:#fff;border-radius:7px;text-decoration:none;font-weight:600;font-size:.82rem}
@media(max-width:480px){.nav-links .hide-mobile{display:none}}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-brand">
    <div class="diamond"></div>
    <span class="brand-text">12 Easy Steps</span>
  </a>
  <div class="nav-links">
    <a href="index.html" class="nav-link hide-mobile">← Home</a>
    <a href="steps.html" class="nav-link active">Steps Workbook</a>
    <a href="report-card.html" class="nav-link">Report Card</a>
  </div>
</nav>

<div class="frame-wrap">
  <div class="loading" id="loading">
    <div class="spin-diamond"></div>
    <p>Loading your workbook…</p>
  </div>
  <iframe
    id="frame"
    src="https://12stepstaken.netlify.app/"
    title="12 Steps Workbook"
    allow="clipboard-read; clipboard-write"
    onload="onLoad()">
  </iframe>
  <div class="fallback" id="fallback">
    <h2>Steps Workbook</h2>
    <p>Tap below to open the workbook directly in a new tab.</p>
    <a href="https://12stepstaken.netlify.app/" target="_blank">Open Workbook ↗</a>
  </div>
</div>

<script>
function onLoad(){setTimeout(()=>document.getElementById('loading').classList.add('done'),500)}
setTimeout(()=>{
  try{
    const f=document.getElementById('frame');
    if(!f.contentDocument||f.contentDocument.URL==='about:blank')showFallback();
    else document.getElementById('loading').classList.add('done');
  }catch(e){document.getElementById('loading').classList.add('done')}
},4500);
function showFallback(){
  document.getElementById('loading').style.display='none';
  document.getElementById('frame').style.display='none';
  document.getElementById('fallback').style.display='flex';
}
</script>
</body>
</html>
