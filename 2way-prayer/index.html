<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2-Way Prayer</title>
<style>
  :root{
    --bg:#f7f4ee;
    --bg-grad-a:#f7f4ee;
    --bg-grad-b:#eef2f4;
    --paper:#ffffff;
    --ink:#2c3a42;
    --ink-soft:#5c6b73;
    --line:#e2e0d6;
    --blue:#7fa3bd;
    --blue-deep:#4f7691;
    --gold:#c9a96b;
    --shadow:0 8px 30px rgba(47,66,77,0.08);
    --shadow-soft:0 2px 10px rgba(47,66,77,0.06);
    --radius:20px;
    --radius-sm:12px;
    --serif:'Cormorant Garamond', Georgia, 'Times New Roman', serif;
    --sans:'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  [data-theme="dark"]{
    --bg:#121a20;
    --bg-grad-a:#0f161b;
    --bg-grad-b:#16222a;
    --paper:#1a252c;
    --ink:#e7edf2;
    --ink-soft:#93a5ae;
    --line:#2a3941;
    --blue:#7fa3bd;
    --blue-deep:#a9c6da;
    --gold:#d8bd8a;
    --shadow:0 8px 30px rgba(0,0,0,0.35);
    --shadow-soft:0 2px 10px rgba(0,0,0,0.25);
  }

  @font-face{
    font-family:'Cormorant Garamond';
    src:local('Cormorant Garamond');
  }

  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}

  body{
    margin:0;
    min-height:100vh;
    font-family:var(--sans);
    color:var(--ink);
    background:
      radial-gradient(1200px 600px at 10% -10%, var(--blue) 0%, transparent 45%),
      radial-gradient(1000px 500px at 110% 10%, var(--gold) 0%, transparent 40%),
      linear-gradient(180deg, var(--bg-grad-a), var(--bg-grad-b));
    background-attachment:fixed;
    -webkit-font-smoothing:antialiased;
    transition:background 0.4s ease, color 0.4s ease;
    padding-bottom:80px;
  }

  body::before{
    content:"";
    position:fixed;
    inset:0;
    background:var(--bg);
    opacity:0.86;
    z-index:-1;
  }

  a{color:inherit;}

  /* ===================== TOP BAR ===================== */
  .topbar{
    display:flex;
    justify-content:flex-end;
    gap:10px;
    padding:18px 26px 0;
    max-width:1200px;
    margin:0 auto;
  }
  .icon-btn{
    background:var(--paper);
    border:1px solid var(--line);
    color:var(--ink-soft);
    width:40px;height:40px;
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    box-shadow:var(--shadow-soft);
    transition:transform 0.2s ease, color 0.2s ease;
    font-size:16px;
  }
  .icon-btn:hover{transform:translateY(-2px);color:var(--blue-deep);}
  .icon-btn:focus-visible, button:focus-visible, textarea:focus-visible, input:focus-visible{
    outline:2px solid var(--blue-deep);
    outline-offset:2px;
  }

  /* ===================== HEADER ===================== */
  header.hero{
    max-width:1200px;
    margin:0 auto;
    padding:10px 26px 30px;
    text-align:center;
  }
  header.hero h1{
    font-family:var(--serif);
    font-weight:600;
    font-size:clamp(2.4rem, 5vw, 3.6rem);
    margin:0 0 6px;
    letter-spacing:0.01em;
    color:var(--ink);
  }
  header.hero .subtitle{
    font-family:var(--serif);
    font-style:italic;
    font-size:1.15rem;
    color:var(--ink-soft);
    letter-spacing:0.03em;
    margin:0;
  }

  /* ===================== SECTION 1 : PRAYER + TIMER ===================== */
  .prayer-section{
    max-width:1200px;
    margin:0 auto;
    padding:0 26px;
  }

  .prayer-top{
    display:grid;
    grid-template-columns:1fr 300px;
    gap:28px;
    align-items:stretch;
    margin-bottom:28px;
  }
  @media (max-width:860px){
    .prayer-top{grid-template-columns:1fr;}
  }

  .prayer-card{
    background:var(--paper);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    padding:32px 34px;
    display:flex;
    flex-direction:column;
    justify-content:center;
  }
  .prayer-card h2{
    font-family:var(--serif);
    font-weight:600;
    font-size:2rem;
    margin:0 0 10px;
  }
  .date-row{
    display:flex;
    align-items:center;
    gap:10px;
    margin-top:4px;
  }
  .date-row label{
    font-size:0.78rem;
    text-transform:uppercase;
    letter-spacing:0.09em;
    color:var(--ink-soft);
  }
  .date-input{
    border:none;
    background:transparent;
    font-family:var(--sans);
    font-size:0.95rem;
    color:var(--ink);
    border-bottom:1px solid var(--line);
    padding:2px 2px 4px;
  }
  .date-input:focus{outline:none;border-bottom-color:var(--blue-deep);}

  .timer-card{
    background:var(--paper);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    padding:24px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:14px;
  }
  .timer-ring-wrap{
    position:relative;
    width:180px;height:180px;
  }
  .timer-ring-wrap svg{transform:rotate(-90deg);}
  .ring-bg{fill:none;stroke:var(--line);stroke-width:8;}
  .ring-progress{
    fill:none;
    stroke:var(--blue-deep);
    stroke-width:8;
    stroke-linecap:round;
    transition:stroke-dashoffset 1s linear, stroke 1s ease;
  }
  .timer-time{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:var(--serif);
    font-size:2.1rem;
    font-weight:600;
    color:var(--ink);
  }
  .timer-controls{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    justify-content:center;
  }
  .timer-controls button{
    font-family:var(--sans);
    font-size:0.82rem;
    letter-spacing:0.03em;
    padding:8px 16px;
    border-radius:999px;
    border:1px solid var(--line);
    background:transparent;
    color:var(--ink-soft);
    cursor:pointer;
    transition:all 0.2s ease;
  }
  .timer-controls button:hover{background:var(--blue);color:#fff;border-color:var(--blue);}
  .timer-controls button.primary{background:var(--blue-deep);color:#fff;border-color:var(--blue-deep);}
  .timer-controls button.primary:hover{opacity:0.88;}
  .timer-msg{
    font-family:var(--serif);
    font-style:italic;
    font-size:0.95rem;
    color:var(--blue-deep);
    text-align:center;
    min-height:1.2em;
  }
  .timer-msg-actions{
    display:none;
    gap:8px;
  }
  .timer-msg-actions.show{display:flex;}

  /* ===================== MAIN WRITING AREA ===================== */
  .writing-card{
    background:var(--paper);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    padding:34px;
    margin-bottom:30px;
  }
  textarea{
    width:100%;
    border:none;
    resize:none;
    font-family:var(--serif);
    font-size:1.18rem;
    line-height:1.7;
    color:var(--ink);
    background:transparent;
    padding:0;
    min-height:220px;
  }
  textarea:focus{outline:none;}
  .writing-card textarea{min-height:260px;}

  .stats-row{
    display:flex;
    gap:18px;
    flex-wrap:wrap;
    margin-top:14px;
    padding-top:14px;
    border-top:1px solid var(--line);
    font-size:0.78rem;
    color:var(--ink-soft);
    letter-spacing:0.03em;
  }

  /* ===================== TOOLBAR ===================== */
  .toolbar{
    max-width:1200px;
    margin:0 auto 34px;
    padding:0 26px;
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    justify-content:center;
  }
  .toolbar button{
    font-family:var(--sans);
    font-size:0.82rem;
    padding:9px 18px;
    border-radius:999px;
    border:1px solid var(--line);
    background:var(--paper);
    color:var(--ink-soft);
    cursor:pointer;
    box-shadow:var(--shadow-soft);
    transition:all 0.2s ease;
  }
  .toolbar button:hover{border-color:var(--blue-deep);color:var(--blue-deep);transform:translateY(-1px);}
  .toolbar button.danger:hover{border-color:#c17b6b;color:#c17b6b;}

  /* ===================== SECTION 2 : FEEDBACK GRID ===================== */
  .feedback-section{
    max-width:1200px;
    margin:0 auto;
    padding:0 26px;
  }
  .feedback-heading{
    text-align:center;
    font-family:var(--serif);
    font-size:1.6rem;
    font-weight:600;
    margin:0 0 22px;
    color:var(--ink);
  }
  .grid-row{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:22px;
    margin-bottom:22px;
  }
  @media (max-width:860px){
    .grid-row{grid-template-columns:1fr;}
  }
  .fbox{
    background:var(--paper);
    border-radius:var(--radius-sm);
    box-shadow:var(--shadow-soft);
    padding:22px 24px;
    display:flex;
    flex-direction:column;
  }
  .fbox h3{
    font-family:var(--sans);
    font-weight:600;
    font-size:0.86rem;
    letter-spacing:0.02em;
    color:var(--blue-deep);
    margin:0 0 12px;
    min-height:2.4em;
  }
  .fbox textarea{
    font-family:var(--sans);
    font-size:0.95rem;
    line-height:1.6;
    min-height:120px;
    flex:1;
  }
  .fbox .stats-row{margin-top:10px;padding-top:10px;font-size:0.7rem;}
  .name-box input{
    width:100%;
    font-family:var(--serif);
    font-size:1.3rem;
    border:none;
    border-bottom:2px solid var(--line);
    background:transparent;
    color:var(--ink);
    padding:6px 2px 10px;
  }
  .name-box input:focus{outline:none;border-bottom-color:var(--blue-deep);}
  .name-box{justify-content:center;}

  /* ===================== FOCUS MODE ===================== */
  body.focus-mode .toolbar,
  body.focus-mode .feedback-section,
  body.focus-mode .prayer-card .date-row,
  body.focus-mode .topbar > *:not(.exit-focus-btn){
    display:none !important;
  }
  body.focus-mode .prayer-top{grid-template-columns:1fr 300px;}
  .exit-focus-btn{display:none;}
  body.focus-mode .exit-focus-btn{display:flex;}

  /* ===================== FOOTER ===================== */
  footer{
    text-align:center;
    font-size:0.75rem;
    color:var(--ink-soft);
    padding:30px 26px 10px;
    font-family:var(--serif);
    font-style:italic;
  }

  /* ===================== PRINT ===================== */
  @media print{
    body{background:#fff;}
    body::before{display:none;}
    .topbar, .toolbar, .timer-card, .icon-btn{display:none !important;}
    .prayer-top{grid-template-columns:1fr;}
    .prayer-card, .writing-card, .fbox{box-shadow:none;border:1px solid #ccc;}
  }

  ::selection{background:var(--gold);color:#fff;}
</style>
</head>
<body>

<div class="topbar">
  <button class="icon-btn exit-focus-btn" id="exitFocusBtn" title="Exit Focus Mode" aria-label="Exit Focus Mode">&#10005;</button>
  <button class="icon-btn" id="focusBtn" title="Focus Mode" aria-label="Toggle Focus Mode">&#9673;</button>
  <button class="icon-btn" id="darkBtn" title="Toggle Dark Mode" aria-label="Toggle Dark Mode">&#9789;</button>
</div>

<header class="hero">
  <h1>2-Way Prayer</h1>
  <p class="subtitle">Be still. Listen. Write. Reflect.</p>
</header>

<section class="prayer-section">

  <div class="prayer-top">
    <div class="prayer-card">
      <h2>My 2-Way Prayer</h2>
      <div class="date-row">
        <label for="prayerDate">Date</label>
        <input type="text" id="prayerDate" class="date-input" />
      </div>
    </div>

    <div class="timer-card">
      <div class="timer-ring-wrap">
        <svg width="180" height="180" viewBox="0 0 180 180">
          <circle class="ring-bg" cx="90" cy="90" r="80"></circle>
          <circle class="ring-progress" id="ringProgress" cx="90" cy="90" r="80"
                  stroke-dasharray="502.4" stroke-dashoffset="0"></circle>
        </svg>
        <div class="timer-time" id="timerDisplay">10:00</div>
      </div>
      <div class="timer-controls">
        <button class="primary" id="startBtn">Begin</button>
        <button id="pauseBtn">Pause</button>
        <button id="resetBtn">Reset</button>
      </div>
      <div class="timer-msg" id="timerMsg"></div>
      <div class="timer-msg-actions" id="timerMsgActions">
        <button id="continueBtn">Continue Writing</button>
        <button id="reflectBtn">Reflect</button>
      </div>
    </div>
  </div>

  <div class="writing-card">
    <textarea id="mainPrayer" placeholder="Begin writing whatever comes to mind as you listen…" spellcheck="true"></textarea>
    <div class="stats-row" id="mainStats"></div>
  </div>

</section>

<div class="toolbar">
  <button id="copyAllBtn">Copy All</button>
  <button id="printBtn">Print</button>
  <button id="downloadTxtBtn">Download TXT</button>
  <button id="downloadHtmlBtn">Download HTML</button>
  <button id="clearAllBtn" class="danger">Clear All</button>
</div>

<section class="feedback-section">
  <h2 class="feedback-heading">Prayer Feedback Workspace</h2>

  <div class="grid-row" id="row1">
    <div class="fbox name-box">
      <h3>Enter Name</h3>
      <input type="text" id="feedbackName" placeholder="Name" />
    </div>
    <div class="fbox">
      <h3 id="r1c2-title">Feedback on My Prayer</h3>
      <textarea class="fb-textarea" data-key="r1c2" spellcheck="true"></textarea>
      <div class="stats-row" data-stats-for="r1c2"></div>
    </div>
    <div class="fbox">
      <h3>Additional Notes <span style="opacity:.6;font-weight:400;">(optional)</span></h3>
      <textarea class="fb-textarea" data-key="r1c3" spellcheck="true"></textarea>
      <div class="stats-row" data-stats-for="r1c3"></div>
    </div>
  </div>

  <div class="grid-row" id="row2"></div>
  <div class="grid-row" id="row3"></div>
  <div class="grid-row" id="row4"></div>

</section>

<footer>
  Ctrl+S to save &nbsp;·&nbsp; Ctrl+P to print &nbsp;·&nbsp; Esc to exit Focus Mode
</footer>

<script>
(function(){
  'use strict';

  var STORAGE_KEY = '2way_prayer_state_v1';

  /* ---------- state ---------- */
  var defaultState = {
    name:'',
    date:'',
    mainPrayer:'',
    darkMode:false,
    timer:{ remaining:600, running:false, endsAt:null },
    boxes:{}
  };
  var state;
  try{
    var saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
    state = saved ? Object.assign({}, defaultState, saved) : Object.assign({}, defaultState);
  }catch(e){ state = Object.assign({}, defaultState); }

  function persist(){
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){}
  }

  /* ---------- dark mode ---------- */
  var root = document.documentElement;
  function applyTheme(){
    if(state.darkMode){ root.setAttribute('data-theme','dark'); }
    else{ root.removeAttribute('data-theme'); }
  }
  applyTheme();
  document.getElementById('darkBtn').addEventListener('click', function(){
    state.darkMode = !state.darkMode;
    applyTheme();
    persist();
  });

  /* ---------- focus mode ---------- */
  function setFocus(on){
    document.body.classList.toggle('focus-mode', on);
  }
  document.getElementById('focusBtn').addEventListener('click', function(){ setFocus(true); });
  document.getElementById('exitFocusBtn').addEventListener('click', function(){ setFocus(false); });

  /* ---------- date ---------- */
  var dateEl = document.getElementById('prayerDate');
  if(!state.date){
    var d = new Date();
    state.date = d.toLocaleDateString(undefined, {weekday:'long', year:'numeric', month:'long', day:'numeric'});
  }
  dateEl.value = state.date;
  dateEl.addEventListener('input', function(){ state.date = dateEl.value; persist(); });

  /* ---------- stats helper ---------- */
  function updateStats(container, text){
    if(!container) return;
    var words = text.trim().length ? text.trim().split(/\s+/).length : 0;
    var chars = text.length;
    var mins = Math.max(1, Math.round(words / 200));
    container.textContent = words + ' words  ·  ' + chars + ' characters  ·  ~' + mins + ' min read';
  }

  /* ---------- main prayer textarea ---------- */
  var mainPrayer = document.getElementById('mainPrayer');
  var mainStats = document.getElementById('mainStats');
  mainPrayer.value = state.mainPrayer || '';
  autoGrow(mainPrayer);
  updateStats(mainStats, mainPrayer.value);

  function autoGrow(ta){
    ta.style.height = 'auto';
    ta.style.height = (ta.scrollHeight + 4) + 'px';
  }

  var saveTimer;
  mainPrayer.addEventListener('input', function(){
    autoGrow(mainPrayer);
    updateStats(mainStats, mainPrayer.value);
    clearTimeout(saveTimer);
    saveTimer = setTimeout(function(){
      state.mainPrayer = mainPrayer.value;
      persist();
    }, 800);
  });

  /* ---------- name + dynamic titles ---------- */
  var nameInput = document.getElementById('feedbackName');
  nameInput.value = state.name || '';

  var row2 = document.getElementById('row2');
  var row3 = document.getElementById('row3');
  var row4 = document.getElementById('row4');

  function buildRow(container, rowIndex){
    var cols = [
      { key:'r'+rowIndex+'c1', kind:'my' },
      { key:'r'+rowIndex+'c2', kind:'their' },
      { key:'r'+rowIndex+'c3', kind:'their' }
    ];
    cols.forEach(function(col){
      var box = document.createElement('div');
      box.className = 'fbox';
      var h3 = document.createElement('h3');
      h3.dataset.kind = col.kind;
      var ta = document.createElement('textarea');
      ta.className = 'fb-textarea';
      ta.dataset.key = col.key;
      ta.spellcheck = true;
      var stats = document.createElement('div');
      stats.className = 'stats-row';
      stats.dataset.statsFor = col.key;
      box.appendChild(h3);
      box.appendChild(ta);
      box.appendChild(stats);
      container.appendChild(box);
    });
  }
  buildRow(row2, 2);
  buildRow(row3, 3);
  buildRow(row4, 4);

  function currentName(){
    var n = (nameInput.value || '').trim();
    return n.length ? n : 'Their';
  }

  function refreshTitles(){
    var n = currentName();
    document.getElementById('r1c2-title').textContent = n + "'s Feedback on My Prayer";
    document.querySelectorAll('h3[data-kind="my"]').forEach(function(h){
      h.textContent = 'My Feedback on ' + n + "'s Prayer";
    });
    document.querySelectorAll('h3[data-kind="their"]').forEach(function(h){
      h.textContent = n + "'s Feedback on " + n + "'s Prayer";
    });
  }

  /* ---------- wire up all feedback textareas ---------- */
  function wireTextareas(){
    document.querySelectorAll('.fb-textarea').forEach(function(ta){
      var key = ta.dataset.key;
      ta.value = (state.boxes && state.boxes[key]) || '';
      autoGrow(ta);
      var statsEl = document.querySelector('[data-stats-for="'+key+'"]');
      updateStats(statsEl, ta.value);
      var t;
      ta.addEventListener('input', function(){
        autoGrow(ta);
        updateStats(statsEl, ta.value);
        clearTimeout(t);
        t = setTimeout(function(){
          state.boxes = state.boxes || {};
          state.boxes[key] = ta.value;
          persist();
        }, 800);
      });
    });
  }
  wireTextareas();
  refreshTitles();

  nameInput.addEventListener('input', function(){
    state.name = nameInput.value;
    refreshTitles();
    persist();
  });

  /* ---------- timer ---------- */
  var TOTAL = 600;
  var ring = document.getElementById('ringProgress');
  var CIRC = 2 * Math.PI * 80;
  ring.setAttribute('stroke-dasharray', CIRC.toFixed(1));

  var display = document.getElementById('timerDisplay');
  var startBtn = document.getElementById('startBtn');
  var pauseBtn = document.getElementById('pauseBtn');
  var resetBtn = document.getElementById('resetBtn');
  var msgEl = document.getElementById('timerMsg');
  var msgActions = document.getElementById('timerMsgActions');

  var remaining = (state.timer && typeof state.timer.remaining === 'number') ? state.timer.remaining : TOTAL;
  var running = false;
  var intervalId = null;

  function formatTime(s){
    var m = Math.floor(s/60);
    var sec = s % 60;
    return (m<10?'0':'')+m + ':' + (sec<10?'0':'')+sec;
  }

  function renderTimer(){
    display.textContent = formatTime(remaining);
    var pct = remaining / TOTAL;
    var offset = CIRC * (1 - pct);
    ring.style.strokeDashoffset = offset.toFixed(1);
    if(pct < 0.34){ ring.style.stroke = '#c17b6b'; }
    else if(pct < 0.67){ ring.style.stroke = getComputedStyle(root).getPropertyValue('--gold'); }
    else{ ring.style.stroke = getComputedStyle(root).getPropertyValue('--blue-deep'); }
  }
  renderTimer();

  function playChime(){
    try{
      var ctx = new (window.AudioContext || window.webkitAudioContext)();
      var now = ctx.currentTime;
      [523.25, 659.25, 783.99].forEach(function(freq, i){
        var osc = ctx.createOscillator();
        var gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0, now + i*0.28);
        gain.gain.linearRampToValueAtTime(0.18, now + i*0.28 + 0.05);
        gain.gain.exponentialRampToValueAtTime(0.001, now + i*0.28 + 1.6);
        osc.connect(gain).connect(ctx.destination);
        osc.start(now + i*0.28);
        osc.stop(now + i*0.28 + 1.7);
      });
    }catch(e){}
  }

  function finishTimer(){
    running = false;
    clearInterval(intervalId);
    playChime();
    msgEl.textContent = 'Your listening time has ended.';
    msgActions.classList.add('show');
    saveTimerState();
  }

  function tick(){
    if(remaining <= 0){ finishTimer(); return; }
    remaining -= 1;
    renderTimer();
    if(remaining <= 0){ finishTimer(); }
    else{ saveTimerState(); }
  }

  function saveTimerState(){
    state.timer = { remaining:remaining, running:running };
    persist();
  }

  startBtn.addEventListener('click', function(){
    if(running) return;
    running = true;
    msgEl.textContent = '';
    msgActions.classList.remove('show');
    intervalId = setInterval(tick, 1000);
    saveTimerState();
  });
  pauseBtn.addEventListener('click', function(){
    running = false;
    clearInterval(intervalId);
    saveTimerState();
  });
  resetBtn.addEventListener('click', function(){
    running = false;
    clearInterval(intervalId);
    remaining = TOTAL;
    msgEl.textContent = '';
    msgActions.classList.remove('show');
    renderTimer();
    saveTimerState();
  });
  document.getElementById('continueBtn').addEventListener('click', function(){
    msgEl.textContent = '';
    msgActions.classList.remove('show');
    mainPrayer.focus();
  });
  document.getElementById('reflectBtn').addEventListener('click', function(){
    msgEl.textContent = 'Take a quiet moment before you write.';
    document.querySelector('.feedback-section').scrollIntoView({behavior:'smooth'});
  });

  /* resume in-progress timer visually (does not auto-run across reloads) */
  if(state.timer && state.timer.remaining != null){
    remaining = state.timer.remaining;
    renderTimer();
  }

  /* ---------- toolbar actions ---------- */
  function gatherAllText(){
    var n = currentName();
    var out = [];
    out.push('2-WAY PRAYER — ' + (dateEl.value || ''));
    out.push('');
    out.push('MY 2-WAY PRAYER');
    out.push(mainPrayer.value || '(empty)');
    out.push('');
    out.push('PRAYER FEEDBACK WORKSPACE — ' + n);
    document.querySelectorAll('.fb-textarea').forEach(function(ta){
      var h3 = ta.previousElementSibling;
      out.push('');
      out.push((h3 ? h3.textContent : ta.dataset.key) + ':');
      out.push(ta.value || '(empty)');
    });
    return out.join('\n');
  }

  document.getElementById('copyAllBtn').addEventListener('click', function(){
    var text = gatherAllText();
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(function(){
        flashMsg('Copied to clipboard');
      }).catch(function(){ flashMsg('Could not copy'); });
    }else{
      flashMsg('Clipboard not available');
    }
  });

  function flashMsg(text){
    var old = msgEl.textContent;
    msgEl.textContent = text;
    setTimeout(function(){ if(msgEl.textContent===text) msgEl.textContent = old; }, 1800);
  }

  document.getElementById('printBtn').addEventListener('click', function(){ window.print(); });

  function downloadBlob(content, filename, type){
    var blob = new Blob([content], {type:type});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    setTimeout(function(){ URL.revokeObjectURL(url); }, 500);
  }

  document.getElementById('downloadTxtBtn').addEventListener('click', function(){
    downloadBlob(gatherAllText(), '2-way-prayer-' + (dateEl.value||'export').replace(/[^\w-]+/g,'_') + '.txt', 'text/plain');
  });

  document.getElementById('downloadHtmlBtn').addEventListener('click', function(){
    var text = gatherAllText().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    var html = '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>2-Way Prayer</title>' +
      '<style>body{font-family:Georgia,serif;max-width:700px;margin:60px auto;line-height:1.7;color:#2c3a42;white-space:pre-wrap;padding:0 20px;}</style>' +
      '</head><body>' + text + '</body></html>';
    downloadBlob(html, '2-way-prayer-' + (dateEl.value||'export').replace(/[^\w-]+/g,'_') + '.html', 'text/html');
  });

  document.getElementById('clearAllBtn').addEventListener('click', function(){
    if(!confirm('Clear all writing on this page? This cannot be undone.')) return;
    mainPrayer.value = '';
    autoGrow(mainPrayer); updateStats(mainStats, '');
    document.querySelectorAll('.fb-textarea').forEach(function(ta){
      ta.value=''; autoGrow(ta);
      var statsEl = document.querySelector('[data-stats-for="'+ta.dataset.key+'"]');
      updateStats(statsEl, '');
    });
    nameInput.value = '';
    state = Object.assign({}, defaultState, {darkMode:state.darkMode, date:state.date});
    refreshTitles();
    persist();
  });

  /* ---------- keyboard shortcuts ---------- */
  document.addEventListener('keydown', function(e){
    var mod = e.ctrlKey || e.metaKey;
    if(mod && e.key.toLowerCase()==='s'){
      e.preventDefault();
      document.getElementById('downloadTxtBtn').click();
    }else if(mod && e.key.toLowerCase()==='p'){
      // let native print proceed
    }else if(e.key === 'Escape'){
      setFocus(false);
    }
  });

  window.addEventListener('resize', function(){
    autoGrow(mainPrayer);
    document.querySelectorAll('.fb-textarea').forEach(autoGrow);
  });

})();
</script>
</body>
</html>
